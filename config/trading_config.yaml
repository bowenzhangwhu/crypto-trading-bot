# 交易配置
# Trading Configuration

trading:
  symbol: "DOGE/USDT:USDT"  # 交易对
  timeframe: "15m"          # K线周期
  leverage: 5               # 杠杆倍数
  test_mode: false          # 测试模式
  data_points: 96           # 数据点数量（24小时数据）

# 分析周期设置
analysis_periods:
  short_term: 20    # 短期均线
  medium_term: 50   # 中期均线
  long_term: 96     # 长期趋势

# 仓位管理配置
position_management:
  enable_intelligent_position: true  # 启用智能仓位管理
  base_usdt_amount: 1               # 基础USDT金额
  high_confidence_multiplier: 1.5   # 高信心倍数
  medium_confidence_multiplier: 0.5 # 中信心倍数
  low_confidence_multiplier: 0.1    # 低信心倍数
  max_position_ratio: 0.5           # 最大仓位比例
  trend_strength_multiplier: 1.1    # 趋势强度倍数

# 技术指标配置
technical_indicators:
  sma_periods: [5, 20, 50]    # 简单移动平均线周期
  ema_fast: 12                # 快速EMA周期
  ema_slow: 26                # 慢速EMA周期
  macd_signal: 9              # MACD信号线周期
  rsi_period: 14              # RSI周期
  bb_period: 20               # 布林带周期
  bb_std: 2                   # 布林带标准差倍数
  volume_ma_period: 20        # 成交量均线周期
  support_resistance_lookback: 20  # 支撑阻力回看周期

# 情绪指标配置
sentiment:
  enabled: true
  api_url: "https://service.cryptoracle.network/openapi/v2/endpoint"
  api_key: "7ad48a56-8730-4238-a714-eebc30834e3e"
  lookback_hours: 4
  tokens: ["BTC"]

# 风险管理配置
risk_management:
  min_balance_threshold: 0.5      # 最小余额阈值（USDT）
  stop_loss_percentage: 0.02      # 止损百分比（2%）
  take_profit_percentage: 0.02    # 止盈百分比（2%）
  max_daily_trades: 10            # 每日最大交易次数
  cooldown_period_minutes: 15     # 交易冷却期（分钟）

# 交易执行配置
execution:
  order_tag: "60bb4a8d3416BCDE"   # 订单标签
  retry_attempts: 2               # 重试次数
  retry_delay_seconds: 1          # 重试延迟
  position_check_interval: 60     # 持仓检查间隔（秒）
