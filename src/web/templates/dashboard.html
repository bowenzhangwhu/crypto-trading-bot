<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI量化交易监控面板</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-gray-900 text-white">
    <div class="container mx-auto px-4 py-6">
        <!-- 头部 -->
        <header class="mb-8">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                        AI量化交易监控面板
                    </h1>
                    <p class="text-gray-400 mt-1">实时监控交易状态与绩效</p>
                </div>
                <div class="flex items-center space-x-4">
                    <div id="connection-status" class="flex items-center">
                        <span class="w-3 h-3 bg-green-500 rounded-full mr-2"></span>
                        <span class="text-sm">已连接</span>
                    </div>
                    <div id="current-time" class="text-gray-400 text-sm"></div>
                </div>
            </div>
        </header>

        <!-- 关键指标卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- 当前价格 -->
            <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
                <div class="text-gray-400 text-sm mb-2">当前价格</div>
                <div class="text-3xl font-bold" id="current-price">--</div>
                <div class="text-sm mt-2" id="price-change">--</div>
            </div>

            <!-- 当前持仓 -->
            <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
                <div class="text-gray-400 text-sm mb-2">当前持仓</div>
                <div class="text-3xl font-bold" id="position-side">--</div>
                <div class="text-sm mt-2" id="position-size">--</div>
            </div>

            <!-- 未实现盈亏 -->
            <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
                <div class="text-gray-400 text-sm mb-2">未实现盈亏</div>
                <div class="text-3xl font-bold" id="unrealized-pnl">--</div>
                <div class="text-sm mt-2" id="entry-price">--</div>
            </div>

            <!-- 今日盈亏 -->
            <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
                <div class="text-gray-400 text-sm mb-2">今日盈亏</div>
                <div class="text-3xl font-bold" id="today-pnl">--</div>
                <div class="text-sm mt-2" id="today-trades">--</div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <!-- 价格走势图 -->
            <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
                <h3 class="text-lg font-semibold mb-4">价格走势</h3>
                <div id="price-chart" style="height: 350px;"></div>
            </div>

            <!-- 余额变化图 -->
            <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
                <h3 class="text-lg font-semibold mb-4">余额变化</h3>
                <div id="balance-chart" style="height: 350px;"></div>
            </div>
        </div>

        <!-- 交易记录和信号 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <!-- 最近交易 -->
            <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
                <h3 class="text-lg font-semibold mb-4">最近交易</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-400 border-b border-gray-700">
                                <th class="text-left py-2">时间</th>
                                <th class="text-left py-2">类型</th>
                                <th class="text-right py-2">数量</th>
                                <th class="text-right py-2">价格</th>
                                <th class="text-right py-2">盈亏</th>
                            </tr>
                        </thead>
                        <tbody id="trades-table">
                            <tr><td colspan="5" class="py-4 text-center text-gray-500">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 最近信号 -->
            <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
                <h3 class="text-lg font-semibold mb-4">最近信号</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="text-gray-400 border-b border-gray-700">
                                <th class="text-left py-2">时间</th>
                                <th class="text-left py-2">信号</th>
                                <th class="text-left py-2">信心</th>
                                <th class="text-left py-2">原因</th>
                            </tr>
                        </thead>
                        <tbody id="signals-table">
                            <tr><td colspan="4" class="py-4 text-center text-gray-500">加载中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 绩效统计 -->
        <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
            <h3 class="text-lg font-semibold mb-4">绩效统计</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="text-center">
                    <div class="text-gray-400 text-sm">总交易次数</div>
                    <div class="text-2xl font-bold mt-1" id="total-trades">--</div>
                </div>
                <div class="text-center">
                    <div class="text-gray-400 text-sm">胜率</div>
                    <div class="text-2xl font-bold mt-1" id="win-rate">--</div>
                </div>
                <div class="text-center">
                    <div class="text-gray-400 text-sm">总盈亏</div>
                    <div class="text-2xl font-bold mt-1" id="total-pnl">--</div>
                </div>
                <div class="text-center">
                    <div class="text-gray-400 text-sm">盈利交易</div>
                    <div class="text-2xl font-bold mt-1" id="profitable-trades">--</div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
